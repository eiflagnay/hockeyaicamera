<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStrike Hockey Analyst</title>
    <!-- Favicon fix to stop 404 error -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏒</text></svg>">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Icons (SVG Components) ---
        const CameraIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 opacity-50"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const ActivityIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;

        const apiKey = ""; // Environment provided key
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [error, setError] = useState(null);
            const [capturedImage, setCapturedImage] = useState(null);
            const [userKey, setUserKey] = useState("");
            const [showSettings, setShowSettings] = useState(false);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);

            const activeKey = userKey || apiKey;

            const startCamera = async () => {
                try {
                    setError(null);
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            facingMode: "environment", 
                            width: { ideal: 1280 },
                            height: { ideal: 720 }
                        } 
                    });
                    
                    if (videoRef.current) {
                        videoRef.current.srcObject = stream;
                        streamRef.current = stream;
                        setIsCameraActive(true);
                        videoRef.current.onloadedmetadata = () => {
                            videoRef.current.play().catch(e => console.error("Video play failed:", e));
                        };
                    }
                } catch (err) {
                    console.error("Camera Error:", err);
                    setError("Camera access denied or not found.");
                }
            };

            const analyzePosture = async () => {
                if (!activeKey) {
                    setError("API Key is missing. Tap the settings gear to add your Gemini API key.");
                    setShowSettings(true);
                    return;
                }

                setIsAnalyzing(true);
                setError(null);
                const canvas = canvasRef.current;
                const video = videoRef.current;
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                setCapturedImage(canvas.toDataURL('image/jpeg'));

                const prompt = "Analyze this hockey player's strike posture. Return JSON with overallScore (number), observations (array of strings), corrections (array of strings), and pros (array of strings). Focus on weight transfer and knee bend.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${activeKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || "API request failed");
                    }
                    
                    const result = await response.json();
                    const textFeedback = result.candidates[0].content.parts[0].text;
                    setFeedback(JSON.parse(textFeedback));
                } catch (err) {
                    console.error(err);
                    setError(err.message.includes("API key") ? "Invalid API Key. Please check your settings." : "Analysis failed. Ensure you have an internet connection.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center">
                    <header className="w-full max-w-4xl flex items-center justify-between mb-8">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-900/20"><ActivityIcon /></div>
                            <h1 className="text-2xl font-bold tracking-tight">ProStrike Analyst</h1>
                        </div>
                        <button 
                            onClick={() => setShowSettings(!showSettings)}
                            className="p-2 hover:bg-slate-800 rounded-full transition-colors relative"
                        >
                            <SettingsIcon />
                            {!activeKey && <span className="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>}
                        </button>
                    </header>

                    {/* Settings Modal/Panel */}
                    {showSettings && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="glass-panel w-full max-w-md border border-slate-700 rounded-3xl p-8 shadow-2xl animate-in zoom-in-95">
                                <h2 className="text-xl font-bold mb-2">API Configuration</h2>
                                <p className="text-sm text-slate-400 mb-6">Enter your Google Gemini API key to enable AI analysis. You can get one for free at <a href="https://aistudio.google.com/" target="_blank" className="text-blue-400 underline">AI Studio</a>.</p>
                                
                                <div className="space-y-4">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold uppercase tracking-wider text-slate-500">Google Gemini API Key</label>
                                        <input 
                                            type="password"
                                            value={userKey}
                                            onChange={(e) => setUserKey(e.target.value)}
                                            placeholder="Paste your key here..."
                                            className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors"
                                        />
                                    </div>
                                    <button 
                                        onClick={() => setShowSettings(false)}
                                        className="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all active:scale-95"
                                    >
                                        Save & Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* Video Section */}
                        <div className="space-y-4">
                            <div className="relative aspect-video bg-slate-900 rounded-3xl overflow-hidden border border-slate-800 shadow-2xl flex items-center justify-center">
                                <video 
                                    ref={videoRef} 
                                    autoPlay 
                                    playsInline 
                                    muted 
                                    className={`w-full h-full object-cover transition-opacity duration-500 ${isCameraActive ? 'opacity-100' : 'opacity-0'}`} 
                                />
                                
                                {!isCameraActive && (
                                    <div className="absolute inset-0 flex flex-col items-center justify-center p-8 text-center bg-slate-900/50 backdrop-blur-sm">
                                        <CameraIcon />
                                        <p className="mt-4 text-slate-400 mb-6 font-medium">Camera feed will appear here</p>
                                        <button 
                                            onClick={startCamera} 
                                            className="px-10 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all shadow-xl shadow-blue-600/30 active:scale-95"
                                        >
                                            Enable Camera
                                        </button>
                                    </div>
                                )}

                                {isCameraActive && !isAnalyzing && (
                                    <button 
                                        onClick={analyzePosture} 
                                        className="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-2xl hover:scale-110 active:scale-90 transition-all group"
                                    >
                                        <div className="text-slate-950 ml-1 group-hover:scale-110 transition-transform"><PlayIcon /></div>
                                    </button>
                                )}

                                {isAnalyzing && (
                                    <div className="absolute inset-0 bg-black/70 backdrop-blur-md flex flex-col items-center justify-center animate-in fade-in duration-300">
                                        <div className="animate-spin rounded-full h-14 w-14 border-4 border-blue-500 border-t-transparent mb-4 shadow-lg shadow-blue-500/20"></div>
                                        <p className="font-bold tracking-widest text-sm uppercase text-blue-400">AI Processing Form</p>
                                    </div>
                                )}
                                <canvas ref={canvasRef} className="hidden" />
                            </div>
                            
                            {error && (
                                <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-sm flex items-start gap-3 animate-in slide-in-from-top-2">
                                    <span className="bg-red-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0">!</span>
                                    <p>{error}</p>
                                </div>
                            )}
                        </div>

                        {/* Results Section */}
                        <div className="space-y-4">
                            {feedback ? (
                                <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl animate-in fade-in slide-in-from-right-8 duration-500">
                                    <div className="flex justify-between items-start mb-8">
                                        <h3 className="text-xl font-bold">Session Summary</h3>
                                        <div className="text-right">
                                            <div className="text-4xl font-black text-blue-500 leading-none">{feedback.overallScore}</div>
                                            <div className="text-[10px] text-slate-500 uppercase font-black tracking-[0.2em] mt-1">Form Rating</div>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div>
                                            <h4 className="text-green-400 font-bold text-xs uppercase tracking-widest mb-3">Highlights</h4>
                                            <ul className="space-y-2">
                                                {feedback.pros.map((p, i) => (
                                                    <li key={i} className="text-sm text-slate-300 bg-green-500/5 p-3 rounded-xl border border-green-500/10 flex gap-3">
                                                        <span className="text-green-500">✓</span> {p}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                        <div>
                                            <h4 className="text-amber-400 font-bold text-xs uppercase tracking-widest mb-3">Coach's Tips</h4>
                                            <ul className="space-y-2">
                                                {feedback.corrections.map((c, i) => (
                                                    <li key={i} className="text-sm text-slate-300 bg-slate-800/50 p-3 rounded-xl border border-slate-700/50 flex gap-3">
                                                        <span className="text-amber-500">→</span> {c}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={() => {setFeedback(null); setCapturedImage(null);}} 
                                        className="mt-8 w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-bold transition-all active:scale-95"
                                    >
                                        Next Repetition
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-slate-900/30 border-2 border-dashed border-slate-800 rounded-3xl h-full min-h-[300px] flex flex-col items-center justify-center text-center p-10 opacity-60">
                                    <ActivityIcon />
                                    <p className="mt-6 text-sm text-slate-400 max-w-[200px]">Position your phone and capture your strike for analysis.</p>
                                </div>
                            )}

                            {capturedImage && feedback && (
                                <div className="rounded-2xl overflow-hidden border border-slate-800 shadow-xl mt-4 relative group">
                                    <div className="absolute inset-0 bg-blue-600/10 mix-blend-overlay"></div>
                                    <img src={capturedImage} className="w-full opacity-60 filter contrast-125" alt="Analyzed Rep" />
                                    <div className="absolute bottom-2 right-4 text-[10px] text-white/30 font-mono">FRAME_CAPTURE_01</div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
