<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStrike Hockey Analyst</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Icons (SVG Components) ---
        const CameraIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const ActivityIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;

        const apiKey = ""; // Set your API key here
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        function App() {
            const [isCameraActive, setIsCameraActive] = useState(false);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [error, setError] = useState(null);
            const [capturedImage, setCapturedImage] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const streamRef = useRef(null);

            const startCamera = async () => {
                try {
                    setError(null);
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment", width: 1280 } 
                    });
                    videoRef.current.srcObject = stream;
                    streamRef.current = stream;
                    setIsCameraActive(true);
                } catch (err) {
                    setError("Camera access denied.");
                }
            };

            const analyzePosture = async () => {
                setIsAnalyzing(true);
                const canvas = canvasRef.current;
                const video = videoRef.current;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);
                
                const base64Data = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                setCapturedImage(canvas.toDataURL('image/jpeg'));

                const prompt = "Analyze this hockey player's strike posture. Return JSON with overallScore, observations, corrections, and pros.";

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Data } }] }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const result = await response.json();
                    setFeedback(JSON.parse(result.candidates[0].content.parts[0].text));
                } catch (err) {
                    setError("Analysis failed.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-4xl mx-auto flex items-center gap-3 mb-8">
                        <div className="bg-blue-600 p-2 rounded-lg"><ActivityIcon /></div>
                        <h1 className="text-2xl font-bold">ProStrike Analyst</h1>
                    </header>

                    <main className="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="relative aspect-video bg-slate-900 rounded-2xl overflow-hidden border border-slate-800">
                            {!isCameraActive ? (
                                <div className="absolute inset-0 flex flex-col items-center justify-center p-8">
                                    <button onClick={startCamera} className="px-8 py-3 bg-blue-600 rounded-xl font-bold">Start Camera</button>
                                </div>
                            ) : (
                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover" />
                            )}
                            {isCameraActive && !isAnalyzing && (
                                <button onClick={analyzePosture} className="absolute bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 bg-white rounded-full flex items-center justify-center">
                                    <div className="text-slate-950"><PlayIcon /></div>
                                </button>
                            )}
                            {isAnalyzing && (
                                <div className="absolute inset-0 bg-black/60 flex items-center justify-center">
                                    <div className="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
                                </div>
                            )}
                            <canvas ref={canvasRef} className="hidden" />
                        </div>

                        <div className="space-y-4">
                            {feedback ? (
                                <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                    <h3 className="text-xl font-bold mb-4">Score: {feedback.overallScore}</h3>
                                    <div className="mb-4">
                                        <h4 className="text-green-400 font-bold text-sm uppercase">Strengths</h4>
                                        {feedback.pros.map((p, i) => <p key={i} className="text-sm">• {p}</p>)}
                                    </div>
                                    <div>
                                        <h4 className="text-amber-400 font-bold text-sm uppercase">To Improve</h4>
                                        {feedback.corrections.map((c, i) => <p key={i} className="text-sm">• {c}</p>)}
                                    </div>
                                    <button onClick={() => setFeedback(null)} className="mt-6 w-full py-2 bg-slate-800 rounded-lg">Reset</button>
                                </div>
                            ) : (
                                <div className="border-2 border-dashed border-slate-800 rounded-2xl p-12 text-center opacity-50">
                                    Capture a frame to see analysis
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
